<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <script src="/admin/vendor/tailwindcss-browser/index.global.js"></script>
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/admin/styles.css" id="__cssAsset" />
  <link rel="stylesheet" href="/admin/toast.css" id="__toastCss" />
  <script>
    (function () {
      var v = Date.now();
      window.__v = v;
      var css = document.getElementById('__cssAsset');
      if (css) css.href = '/admin/styles.css?v=' + v;
      var tcss = document.getElementById('__toastCss');
      if (tcss) tcss.href = '/admin/toast.css?v=' + v;

      // 预检查登录状态，避免闪现登录页
      try {
        var password = sessionStorage.getItem('admin_password') || localStorage.getItem('admin_password') || '';
        if (password) {
          document.documentElement.classList.add('preauth');
        }
      } catch (e) {}
    })();
  </script>

</head>

<body>
  <!-- Login -->
  <div id="loginPage" class="login-wrapper">
    <div class="ghost-bg" aria-hidden="true">
      <i class="fa-solid fa-ghost ghost ghost-1"></i>
      <i class="fa-solid fa-ghost ghost ghost-2"></i>
      <i class="fa-solid fa-ghost ghost ghost-3"></i>
      <i class="fa-solid fa-ghost ghost ghost-4"></i>
      <i class="fa-solid fa-ghost ghost ghost-5"></i>
      <i class="fa-solid fa-ghost ghost ghost-6"></i>
      <i class="fa-solid fa-ghost ghost ghost-7"></i>
      <i class="fa-solid fa-ghost ghost ghost-8"></i>
      <i class="fa-solid fa-ghost ghost ghost-9"></i>
      <i class="fa-solid fa-ghost ghost ghost-10"></i>
      <i class="fa-solid fa-ghost ghost ghost-11"></i>
      <i class="fa-solid fa-ghost ghost ghost-12"></i>
    </div>
    <header class="login-topbar">
      <div class="login-topbar-inner">
        <div class="brand" aria-label="Kiro-Go" data-i18n-aria-label="app.title">
          <img class="brand-icon" src="/admin/favicon.ico" alt="" />
          <span class="brand-text">Kiro-Go</span>
        </div>
        <div class="topbar-actions">
          <div class="lang-switch" id="loginLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
          </div>
          <span class="divider" aria-hidden="true"></span>
          <button id="loginThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
        </div>
      </div>
    </header>
    <main class="login-main">
      <div class="login-box">
        <h1 class="login-title" data-i18n="login.title"></h1>
        <p class="login-subtitle" data-i18n="login.subtitle"></p>
        <div class="form-group">
          <label data-i18n="login.password"></label>
          <div class="input-affix">
            <i class="fa-solid fa-lock affix-icon"></i>
            <input type="password" id="pwdField" data-i18n-placeholder="login.passwordPlaceholder" autocomplete="off" />
            <button type="button" class="affix-btn" id="pwdToggle" aria-label=""
              data-i18n-aria-label="login.showPassword" data-shown="false">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <label class="remember-row" for="rememberPwd">
          <input type="checkbox" id="rememberPwd" />
          <span class="remember-box" aria-hidden="true"><i class="fa-solid fa-check"></i></span>
          <span class="remember-label" data-i18n="login.remember"></span>
        </label>
        <button type="button" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span data-i18n="login.submit"></span>
        </button>

      </div>
    </main>
  </div>

  <!-- Main app -->
  <div id="mainPage" class="hidden">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand-wrap">
          <div class="brand">
            <img class="brand-icon" src="/admin/favicon.ico" alt="" />
            <span class="brand-text">Kiro-Go</span>
          </div>
        </div>
        <nav class="header-nav" aria-label="" data-i18n-aria-label="aria.sections">
          <div class="tabs" id="tabBar">
            <button type="button" class="tab active" data-tab="accounts"><i class="fa-solid fa-users tab-icon"></i><span
                data-i18n="tabs.accounts"></span></button>
            <button type="button" class="tab" data-tab="settings"><i class="fa-solid fa-sliders tab-icon"></i><span
                data-i18n="tabs.settings"></span></button>
            <button type="button" class="tab" data-tab="api"><i class="fa-solid fa-plug tab-icon"></i><span
                data-i18n="tabs.api"></span></button>
            <button type="button" class="tab" data-tab="observe"><i class="fa-solid fa-gauge-high tab-icon"></i><span
                data-i18n="tabs.observe"></span></button>
            <button type="button" class="tab" data-tab="backups"><i class="fa-solid fa-box-archive tab-icon"></i><span
                data-i18n="tabs.backups"></span></button>
            <button type="button" class="tab" data-tab="alerts"><i class="fa-solid fa-bell tab-icon"></i><span
                data-i18n="tabs.alerts"></span></button>
            <button type="button" class="tab" data-tab="requests"><i class="fa-solid fa-list-check tab-icon"></i><span
                data-i18n="tabs.requests"></span></button>
            <button type="button" class="tab" data-tab="stats"><i class="fa-solid fa-chart-line tab-icon"></i><span
                data-i18n="tabs.stats"></span></button>
          </div>
        </nav>
        <div class="topbar-actions flex-wrap justify-end">
          <div class="lang-switch" id="mainLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
          </div>
          <button id="mainThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
        </div>
        <button class="btn btn-outline btn-sm" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span data-i18n="common.logout"></span>
        </button>
      </div>
    </header>

    <div class="container">
      <!-- Stats summary -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.accounts"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statAccounts">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.total"></span></div>
            </div>
            <i class="fa-solid fa-users stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.standby"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statStandby">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="detail.tabStandby"></span></div>
            </div>
            <i class="fa-solid fa-pause-circle stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.requests"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statRequests">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.total"></span></div>
            </div>
            <i class="fa-solid fa-route stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.success"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statSuccess">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.completed"></span></div>
            </div>
            <i class="fa-solid fa-circle-check stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.failed"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statFailed">0</div>
              <div class="stat-sub">
                <span class="stat-label" data-i18n="stats.errors"></span>
              </div>
            </div>
            <i class="fa-solid fa-circle-xmark stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.tokens"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statTokens">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.tokens"></span></div>
            </div>
            <i class="fa-solid fa-cubes-stacked stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.credits"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statCredits">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.credits"></span></div>
            </div>
            <i class="fa-solid fa-coins stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.banned"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statBanned">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.banned"></span></div>
            </div>
            <i class="fa-solid fa-ban stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.exhausted"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--warning" id="statExhausted">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.exhausted"></span></div>
            </div>
            <i class="fa-solid fa-battery-empty stat-icon stat-icon--warning" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.todayBanned"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statTodayBanned">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.todayBanned"></span></div>
            </div>
            <i class="fa-solid fa-calendar-xmark stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.todayExhausted"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--warning" id="statTodayExhausted">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.todayExhausted"></span></div>
            </div>
            <i class="fa-solid fa-calendar-minus stat-icon stat-icon--warning" aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <!-- Accounts tab -->
      <div id="tabAccounts" class="tab-content">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="accounts.title"></span>
            <div class="card-actions">
              <label class="flex items-center gap-2 cursor-pointer select-none" title=""
                data-i18n-title="privacy.tooltip">
                <span class="text-xs font-medium" data-i18n="privacy.label"></span>
                <span class="switch"><input type="checkbox" id="privacyModeToggle" checked /><span
                    class="slider"></span></span>
              </label>
              <button class="btn btn-outline btn-sm" id="refreshAccountsBtn"><i class="fa-solid fa-arrows-rotate"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.refresh"></span></button>
              <button class="btn btn-outline btn-sm" id="exportBtn"><i class="fa-solid fa-file-export"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.export"></span></button>
              <button class="btn btn-outline btn-sm" id="importCredentialsBtn"><i class="fa-solid fa-file-import"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.import"></span></button>
              <button class="btn btn-outline btn-sm" id="refreshAllModelsBtn"><i class="fa-solid fa-arrows-rotate"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="models.refreshAll"></span></button>
              <button class="btn btn-primary btn-sm" id="addAccountBtn"><i class="fa-solid fa-plus"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.add"></span></button>
            </div>
          </div>

          <div class="status-tabs" id="accountStatusTabs" role="tablist" aria-label="" data-i18n-aria-label="filter.status">
            <button class="status-tab" type="button" data-status="all" data-i18n="filter.all"></button>
            <button class="status-tab" type="button" data-status="available" data-i18n="filter.available"></button>
            <button class="status-tab" type="button" data-status="enabled" data-i18n="filter.enabled"></button>
            <button class="status-tab" type="button" data-status="disabled" data-i18n="filter.disabled"></button>
            <button class="status-tab" type="button" data-status="standby" data-i18n="filter.standby"></button>
            <button class="status-tab" type="button" data-status="banned" data-i18n="filter.banned"></button>
            <button class="status-tab" type="button" data-status="exhausted" data-i18n="filter.exhausted"></button>
          </div>

          <div class="toolbar">
            <div class="toolbar-row toolbar-row-filters">
              <input type="text" id="filterSearch" class="toolbar-search" data-i18n-placeholder="filter.search" />
              <div class="toolbar-filter-group">
                <select id="filterGroupSelect" data-i18n-aria-label="accounts.group">
                  <option value="all" data-i18n="filter.allGroups"></option>
                </select>
                <select id="filterStatusSelect" data-i18n-aria-label="filter.status">
                  <option value="all" data-i18n="filter.all"></option>
                  <option value="available" data-i18n="filter.available"></option>
                  <option value="enabled" data-i18n="filter.enabled"></option>
                  <option value="disabled" data-i18n="filter.disabled"></option>
                  <option value="standby" data-i18n="filter.standby"></option>
                  <option value="banned" data-i18n="filter.banned"></option>
                  <option value="exhausted" data-i18n="filter.exhausted"></option>
                </select>
                <select id="sortSelect" data-i18n-aria-label="sort.label">
                  <option value="" data-i18n="sort.default"></option>
                  <option value="-requestCount" data-i18n="sort.requestCountDesc"></option>
                  <option value="requestCount" data-i18n="sort.requestCountAsc"></option>
                  <option value="-totalTokens" data-i18n="sort.totalTokensDesc"></option>
                  <option value="-totalCredits" data-i18n="sort.totalCreditsDesc"></option>
                  <option value="-usagePercent" data-i18n="sort.usagePercentDesc"></option>
                  <option value="-lastUsed" data-i18n="sort.lastUsedDesc"></option>
                  <option value="email" data-i18n="sort.emailAsc"></option>
                </select>
                <button class="btn btn-outline btn-sm" id="clearFiltersBtn" data-i18n="filter.clear"></button>
              </div>
            </div>
            <div class="toolbar-row toolbar-row-primary">
              <label class="toolbar-select-all">
                <input type="checkbox" id="selectAllCheckbox" />
                <span data-i18n="batch.selectAll"></span>
              </label>
              <div id="batchBar" class="batch-bar hidden">
                <span id="batchCount" class="batch-count"></span>
                <button class="btn btn-primary btn-xs" data-batch="enable" data-i18n="batch.enable"></button>
                <button class="btn btn-secondary btn-xs" data-batch="disable" data-i18n="batch.disable"></button>
                <button class="btn btn-secondary btn-xs" data-batch="refresh" data-i18n="batch.refresh"></button>
                <button class="btn btn-secondary btn-xs" data-batch="refreshModels"
                  data-i18n="batch.refreshModels"></button>
                <button class="btn btn-secondary btn-xs" data-batch="setGroup" data-i18n="batch.setGroup"></button>
                <button class="btn btn-secondary btn-xs" data-batch="clearGroup" data-i18n="batch.clearGroup"></button>
                <button class="btn btn-secondary btn-xs" data-batch="setStandby" data-i18n="batch.setStandby"></button>
                <button class="btn btn-secondary btn-xs" data-batch="removeStandby"
                  data-i18n="batch.removeStandby"></button>
                <button class="btn btn-danger btn-xs" data-batch="delete" data-i18n="batch.delete"></button>
              </div>
            </div>
          </div>

          <div id="accountsList"></div>
        </div>
      </div>

      <!-- Settings tab -->
      <div id="tabSettings" class="tab-content hidden">
        <!-- API settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.apiSettings"></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="requireApiKey" /><span class="slider"></span></span>
              <span data-i18n="settings.enableApiKey"></span>
            </label>
          </div>
          <div class="form-group">
            <label data-i18n="settings.apiKeyLabel"></label>
            <div class="input-row">
              <input type="text" id="apiKeyInput" data-i18n-placeholder="settings.apiKeyPlaceholder" />
              <button class="btn btn-outline btn-sm" id="generateApiKeyBtn"
                data-i18n="settings.generateApiKey"></button>
            </div>
          </div>
          <div class="form-group mt-4">
            <div class="settings-subheader">
              <div>
                <label class="font-semibold pb-1 block" data-i18n="settings.apiKeyTable"></label>
                <small data-i18n="settings.apiKeyTableHint"></small>
              </div>
              <button class="btn btn-outline btn-sm" id="addApiKeyRowBtn" type="button">
                <i class="fa-solid fa-plus"></i>
                <span data-i18n="settings.addApiKey"></span>
              </button>
            </div>
            <div id="apiKeyTable" class="admin-table-wrap"></div>
          </div>
          <button class="btn btn-primary" id="saveApiSettingsBtn" data-i18n="settings.saveApiKey"></button>
        </div>

        <!-- Model alias settings -->
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="settings.modelAlias"></span>
            <button class="btn btn-outline btn-sm" id="addModelAliasBtn" type="button">
              <i class="fa-solid fa-plus"></i>
              <span data-i18n="settings.addModelAlias"></span>
            </button>
          </div>
          <small class="settings-card-hint" data-i18n="settings.modelAliasHint"></small>
          <div id="modelAliasTable" class="admin-table-wrap"></div>
          <button class="btn btn-primary mt-3" id="saveModelAliasesBtn" type="button"
            data-i18n="common.saveSettings"></button>
        </div>

        <!-- Group policy settings -->
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="settings.groupPolicy"></span>
            <button class="btn btn-outline btn-sm" id="addGroupPolicyBtn" type="button">
              <i class="fa-solid fa-plus"></i>
              <span data-i18n="settings.addGroupPolicy"></span>
            </button>
          </div>
          <small class="settings-card-hint" data-i18n="settings.groupPolicyHint"></small>
          <div id="groupPolicyTable" class="admin-table-wrap"></div>
          <button class="btn btn-primary mt-3" id="saveGroupPoliciesBtn" type="button"
            data-i18n="common.saveSettings"></button>
        </div>

        <!-- Usage settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.usageSettings"></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="allowOverUsage" /><span class="slider"></span></span>
              <span data-i18n="settings.allowOverUsage"></span>
            </label>
            <small data-i18n="settings.allowOverUsageHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.loadBalancingMode"></label>
            <select id="loadBalancingMode">
              <option value="balanced" data-i18n="settings.loadBalancingBalanced"></option>
              <option value="priority" data-i18n="settings.loadBalancingPriority"></option>
            </select>
            <small data-i18n="settings.loadBalancingModeHint"></small>
          </div>
          <button class="btn btn-primary" id="saveOverUsageBtn" data-i18n="settings.saveUsage"></button>
        </div>

        <!-- Thinking settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.thinkingSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.thinkingSuffix"></label>
            <input type="text" id="thinkingSuffix" placeholder="-thinking" />
            <small data-i18n="settings.thinkingSuffixHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.openaiFormat"></label>
            <select id="openaiThinkingFormat">
              <option value="reasoning_content" data-i18n="settings.formatReasoningContent"></option>
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="settings.claudeFormat"></label>
            <select id="claudeThinkingFormat">
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <button class="btn btn-primary" id="saveThinkingBtn" data-i18n="settings.saveThinking"></button>
        </div>

        <!-- Endpoint settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.endpointSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.preferredEndpoint"></label>
            <select id="preferredEndpoint">
              <option value="auto" data-i18n="settings.endpointAuto"></option>
              <option value="kiro" data-i18n="settings.endpointKiro"></option>
              <option value="codewhisperer" data-i18n="settings.endpointCodeWhisperer"></option>
              <option value="amazonq" data-i18n="settings.endpointAmazonQ"></option>
            </select>
            <small data-i18n="settings.endpointHint"></small>
          </div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="endpointFallback" checked /><span
                  class="slider"></span></span>
